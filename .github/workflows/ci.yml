name: ci
on: [push, pull_request]
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install (resolves deps incl public @hiob git deps)
        run: npm install --no-audit --no-fund --legacy-peer-deps
